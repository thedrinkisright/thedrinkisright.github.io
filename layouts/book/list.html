{{ define "main" }}

<section class="book-body" data-nav-theme="dark">
  <div class="book-inner">

    <div class="book-header">
      <p class="eyebrow">Let's Make It Happen</p>
      <h1 class="book-title">Book <em>The Drink Is Right</em></h1>
      <p class="book-sub">Tell us about your event and we'll get back to you within 24 hours with availability and a custom quote.</p>
    </div>

    <!-- ⚠️ Replace maqvdgrb with your actual Formspree form ID -->
    <form class="book-form" action="https://formspree.io/f/maqvdgrb" method="POST">

      <!-- Hidden fields for Formspree -->
      <input type="hidden" name="_subject" value="New Booking Inquiry — The Drink Is Right" />
      <input type="hidden" name="_next" value="/" />
      <input type="text" name="_gotcha" style="display:none" />

      <div class="form-row form-row--2">
        <div class="form-group">
          <label for="name">Full Name <span class="required">*</span></label>
          <input type="text" id="name" name="name" placeholder="Your full name" required />
        </div>
        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required />
        </div>
      </div>

      <div class="form-row form-row--2">
        <div class="form-group">
          <label for="phone">Phone Number <span class="required">*</span></label>
          <input type="tel" id="phone" name="phone" placeholder="(555) 000-0000" required />
        </div>
        <div class="form-group">
          <label for="date">Event Date <span class="required">*</span></label>
          <div class="date-input-wrap">
            <input type="text" id="date" name="event_date" placeholder="Event Date" onfocus="this.type='date'; try{this.showPicker()}catch(e){}" onblur="if(!this.value)this.type='text'" required />
            <button type="button" class="date-icon-btn" onclick="var d=document.getElementById('date');d.type='date';d.focus();try{d.showPicker()}catch(e){}" tabindex="-1" aria-label="Open calendar">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="form-row form-row--2">
        <div class="form-group">
          <label for="event_type">Event Type <span class="required">*</span></label>
          <select id="event_type" name="event_type" required>
            <option value="" disabled selected>Select an occasion</option>
            <option value="Birthday Party">🎂 Birthday Party</option>
            <option value="Wedding">🥂 Wedding</option>
            <option value="Retirement Party">✨ Retirement Party</option>
            <option value="Anniversary">💍 Anniversary</option>
            <option value="Corporate Event">🏢 Corporate Event</option>
            <option value="Bridal Shower">💐 Bridal Shower</option>
            <option value="House Party">🎉 House Party</option>
            <option value="Graduation Party">🎓 Graduation Party</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="guests">Number of Guests <span class="required">*</span></label>
          <select id="guests" name="guests" required>
            <option value="" disabled selected>Estimated guest count</option>
            <option value="Under 25">Under 25</option>
            <option value="25–50">25–50</option>
            <option value="50–80">50–80</option>
            <option value="80–100">80–100</option>
            <option value="100+">100+</option>
          </select>
        </div>
      </div>

      <div class="form-row form-row--2">
        <div class="form-group">
          <label for="location">Venue / Location <span class="required">*</span></label>
          <input type="text" id="location" name="location" placeholder="Address or venue name" required />
        </div>
        <div class="form-group">
          <label for="service">Bar Service <span class="required">*</span></label>
          <select id="service" name="bar_service" required>
            <option value="" disabled selected>Select a service type</option>
            <option value="BYOB — I'll supply the alcohol">BYOB — I'll supply the alcohol</option>
            <option value="BYOB + Signature Cocktail Menu">BYOB + Signature Cocktail Menu</option>
            <option value="BYOB + Add Ons">BYOB + Add Ons (Cups, Fountain, Jello Shots, etc.)</option>
            <option value="Not Sure Yet">Not Sure Yet — Let's Talk</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="notes">Additional Notes</label>
          <textarea id="notes" name="notes" placeholder="Anything else we should know — theme, special requests, dietary needs..." rows="4"></textarea>
        </div>
      </div>

      <div class="form-row form-submit">
        <button type="submit" class="btn btn-gold btn-full">Send Booking Request →</button>
        <p class="form-note">We typically respond within 24 hours. Prefer to talk? Call us at <a href="tel:9292358606">(929) 235-8606</a>.</p>
      </div>

    </form>

  </div>
</section>

{{ end }}
