<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Black background -->
  <rect width="32" height="32" fill="#000000"/>
  <!-- Martini glass body (triangle) -->
  <polygon points="6,5 26,5 16,18" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Stem -->
  <line x1="16" y1="18" x2="16" y2="26" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="11" y1="26" x2="21" y2="26" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Olive on pick -->
  <line x1="10" y1="8" x2="18" y2="12" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="10" cy="8" r="2" fill="#C9A84C"/>
</svg>
